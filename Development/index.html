<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Smart Guide | Live Evaluation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        :root { --primary: #00f2ff; --bg-dark: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }

        /* Fullscreen Camera Feed */
        #video-feed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1); /* Flips for laptop view, common in AR */
        }

        .ui-overlay { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        /* Permission Button (Hidden after start) */
        #start-screen {
            position: fixed; inset: 0; z-index: 100;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        /* Scanning HUD */
        nav { padding: 30px 20px; display: flex; justify-content: space-between; }
        .badge { background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 50px; border: 1px solid var(--primary); color: var(--primary); font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .pulse { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .reticle { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid rgba(255,255,255,0.2); border-radius: 40px; }
        .scan-line { width: 100%; height: 2px; background: var(--primary); position: absolute; animation: scan 3s infinite; box-shadow: 0 0 15px var(--primary); }
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        /* Info Card */
        .card { background: var(--bg-dark); border-top: 2px solid var(--primary); border-radius: 30px 30px 0 0; padding: 30px; position: fixed; bottom: -100%; left: 0; width: 100%; transition: 0.6s ease; }
        .card.active { bottom: 0; }
        .btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <video id="video-feed" autoplay playsinline></video>

    <div id="start-screen">
        <h1 style="margin-bottom: 20px;">AR Smart Guide</h1>
        <p style="color: #888; margin-bottom: 40px; padding: 0 20px;">Allow camera access to begin the AR experience</p>
        <button class="btn" onclick="initAR()" style="width: 200px;">START CAMERA</button>
    </div>

    <div class="ui-overlay">
        <nav>
            <div class="badge"><div class="pulse"></div> SCANNING...</div>
        </nav>
        <div class="reticle"><div class="scan-line"></div></div>

        <div class="card" id="monumentCard">
            <h1>Taj Mahal</h1>
            <p style="color: var(--primary); margin: 5px 0 15px;">Mughal Empire • 1648</p>
            <p style="color: #ccc; line-height: 1.6;">The Taj Mahal is an ivory-white marble mausoleum on the south bank of the Yamuna river. It was commissioned in 1632 by the Mughal emperor Shah Jahan.</p>
            <button class="btn" onclick="alert('Playing Audio...')"><i data-lucide="volume-2"></i> PLAY AUDIO</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function initAR() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, // Forces REAR camera on phones
                    audio: false 
                });
                const video = document.getElementById('video-feed');
                video.srcObject = stream;
                
                // Hide start screen
                document.getElementById('start-screen').style.display = 'none';

                // Simulate recognition after 3 seconds
                setTimeout(() => {
                    document.getElementById('monumentCard').classList.add('active');
                }, 3000);

            } catch (err) {
                alert("Camera error: " + err.name + ". Make sure you are using HTTPS.");
            }
        }
    </script>
</body>
</html>
