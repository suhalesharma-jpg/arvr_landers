<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Smart Guide - Image Recognition</title>

  <!-- A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>

  <!-- MindAR Image Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .info-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 85%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      display: none;
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>

<body>

<!-- Info Box -->
<div id="info" class="info-box"></div>

<!-- AR Scene -->
<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true;"
  embedded
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Image Target 0 (Mona Lisa) -->
  <a-entity mindar-image-target="targetIndex: 0" id="target0">
    <a-plane 
      position="0 0 0"
      width="1"
      height="0.6"
      color="#FF9800"
      opacity="0.9">
    </a-plane>
  </a-entity>

</a-scene>

<script>
  const infoBox = document.getElementById("info");
  const target0 = document.querySelector("#target0");

  // When image is detected
  target0.addEventListener("targetFound", () => {
    infoBox.innerHTML = `
      <h3>Mona Lisa</h3>
      <p><strong>Artist:</strong> Leonardo da Vinci</p>
      <p><strong>Year:</strong> 1503–1506</p>
      <p><strong>Importance:</strong> One of the most famous paintings in the world.</p>
      <p><strong>Fun Fact:</strong> Known for her mysterious and subtle smile.</p>
    `;
    infoBox.style.display = "block";
  });

  // When image is lost
  target0.addEventListener("targetLost", () => {
    infoBox.style.display = "none";
  });

</script>

</body>
</html>
