
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Smart Guide - Government Museum Chandigarh</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    .info-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
      display: none;
    }
  </style>
</head>

<body>

<div id="info" class="info-box"></div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true;"
  color-space="sRGB"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Target 0 - Gandhara Sculpture -->
  <a-entity mindar-image-target="targetIndex: 0" id="target0">
    <a-plane position="0 0 0" width="1" height="0.6" color="orange"></a-plane>
  </a-entity>

  <!-- Target 1 - Miniature Painting -->
  <a-entity mindar-image-target="targetIndex: 1" id="target1">
    <a-plane position="0 0 0" width="1" height="0.6" color="blue"></a-plane>
  </a-entity>

</a-scene>

<script>
const infoBox = document.getElementById("info");

const target0 = document.querySelector("#target0");
const target1 = document.querySelector("#target1");

target0.addEventListener("targetFound", () => {
  infoBox.innerHTML = `
    <h3>Gandhara Buddha Sculpture</h3>
    <p><strong>History:</strong> 1st–5th century CE, Greco-Roman influence.</p>
    <p><strong>Importance:</strong> Early human representation of Buddha.</p>
    <p><strong>Fun Fact:</strong> Second largest Gandhara collection in India.</p>
  `;
  infoBox.style.display = "block";
});

target1.addEventListener("targetFound", () => {
  infoBox.innerHTML = `
    <h3>Pahari Miniature Painting</h3>
    <p><strong>Period:</strong> 17th–19th century.</p>
    <p><strong>Importance:</strong> Depicts mythological themes.</p>
    <p><strong>Special Feature:</strong> Fine brush detailing.</p>
  `;
  infoBox.style.display = "block";
});

target0.addEventListener("targetLost", () => infoBox.style.display = "none");
target1.addEventListener("targetLost", () => infoBox.style.display = "none");

</script>

</body>
</html>
